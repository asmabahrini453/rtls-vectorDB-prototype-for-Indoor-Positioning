version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rtls-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: rtls_user
      POSTGRES_PASSWORD: rtls_password
      POSTGRES_DB: rtls

    ports:
      - "5432:5432"         

    volumes:
      - rtls_pgdata:/var/lib/postgresql/data  
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql  # runs on first start

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtls_user -d rtls"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rtls_pgdata:
    driver: local